name: Theme CI

on:
    push:
        branches: [main, develop]
        paths:
            - "Theme/**"
            - ".github/workflows/theme.yml"
    pull_request:
        branches: [main, develop]
        paths:
            - "Theme/**"
            - ".github/workflows/theme.yml"

jobs:
    build-and-validate:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./Theme

        strategy:
            matrix:
                node-version: [18.x, 20.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: "./Theme/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Build Tailwind CSS
              run: npm run build

            - name: Validate CSS output
              run: |
                  if [ -f "css/theme.css" ]; then
                    echo "✓ Theme CSS built successfully"
                    wc -l css/theme.css
                  else
                    echo "✗ Theme CSS build failed"
                    exit 1
                  fi

            - name: Validate HTML files
              run: |
                  echo "Validating HTML files..."
                  find . -name "*.html" -type f | while read file; do
                    echo "Checking $file..."
                    if [ -s "$file" ]; then
                      echo "✓ $file is not empty"
                    else
                      echo "⚠ $file is empty"
                    fi
                  done

            - name: Check Tailwind config
              run: |
                  if [ -f "tailwind.config.js" ]; then
                    echo "✓ Tailwind config found"
                    node -e "const config = require('./tailwind.config.js'); console.log('Theme name:', config.theme?.extend?.fontFamily ? 'Custom fonts configured' : 'Default fonts');"
                  else
                    echo "⚠ Tailwind config not found"
                  fi

            - name: Upload theme artifacts
              if: success()
              uses: actions/upload-artifact@v4
              with:
                  name: theme-build-${{ matrix.node-version }}
                  path: |
                      Theme/css/theme.css
                      Theme/css/theme.min.css
                      Theme/*.html
                  retention-days: 7

    css-quality:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./Theme

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v6
              with:
                  node-version: 20.x
                  cache: "npm"
                  cache-dependency-path: "./Theme/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Build CSS
              run: npm run build

            - name: CSS Quality Check
              run: |
                  echo "## CSS Quality Report" > css-report.md
                  echo "" >> css-report.md

                  # Check file sizes
                  if [ -f "css/theme.css" ]; then
                    SIZE=$(wc -c < css/theme.css)
                    echo "- Theme CSS size: ${SIZE} bytes" >> css-report.md
                  fi

                  if [ -f "css/theme.min.css" ]; then
                    MIN_SIZE=$(wc -c < css/theme.min.css)
                    echo "- Minified CSS size: ${MIN_SIZE} bytes" >> css-report.md
                  fi

                  # Count CSS classes/utilities
                  if [ -f "css/theme.css" ]; then
                    UTILITIES=$(grep -o '\.[a-zA-Z0-9_-]*:' css/theme.css | wc -l || echo 0)
                    echo "- Estimated utility classes: ${UTILITIES}" >> css-report.md
                  fi

                  echo "" >> css-report.md
                  echo "### File Structure" >> css-report.md
                  find css -name "*.css" -o -name "*.scss" | while read file; do
                    echo "- $file ($(wc -l < "$file") lines)" >> css-report.md
                  done

                  cat css-report.md

            - name: Upload CSS report
              uses: actions/upload-artifact@v4
              with:
                  name: css-quality-report
                  path: Theme/css-report.md
                  retention-days: 7

    server-test:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./Theme

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v6
              with:
                  node-version: 20.x

            - name: Install dependencies
              run: npm ci

            - name: Build theme
              run: npm run build

            - name: Test server startup
              run: |
                  echo "Testing theme server startup..."
                  timeout 10s npm run serve &
                  SERVER_PID=$!
                  sleep 5

                  if kill -0 $SERVER_PID 2>/dev/null; then
                    echo "✓ Theme server started successfully"
                    kill $SERVER_PID
                  else
                    echo "✗ Theme server failed to start"
                    exit 1
                  fi

    documentation-check:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./Theme

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check documentation files
              run: |
                  echo "## Theme Documentation Status" >> $GITHUB_STEP_SUMMARY

                  docs=("README.md" "SETUP.md" "COMPONENTS.md" "TAILWIND-SETUP.md" "USING-IN-OTHER-PROJECTS.md")

                  for doc in "${docs[@]}"; do
                    if [ -f "$doc" ]; then
                      lines=$(wc -l < "$doc")
                      echo "- ✓ $doc ($lines lines)" >> $GITHUB_STEP_SUMMARY
                    else
                      echo "- ✗ $doc (missing)" >> $GITHUB_STEP_SUMMARY
                    fi
                  done

                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Example Files" >> $GITHUB_STEP_SUMMARY
                  find . -name "*.html" | while read file; do
                    echo "- $file" >> $GITHUB_STEP_SUMMARY
                  done

    build-summary:
        runs-on: ubuntu-latest
        needs:
            [build-and-validate, css-quality, server-test, documentation-check]
        if: always()

        steps:
            - name: Build Summary
              run: |
                  echo "## Theme CI Summary" >> $GITHUB_STEP_SUMMARY
                  echo "- Build and Validate: ${{ needs.build-and-validate.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- CSS Quality: ${{ needs.css-quality.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Server Test: ${{ needs.server-test.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Documentation Check: ${{ needs.documentation-check.result }}" >> $GITHUB_STEP_SUMMARY
                  echo "- Overall Status: ${{ (needs.build-and-validate.result == 'success' && needs.css-quality.result == 'success' && needs.server-test.result == 'success') && 'SUCCESS' || 'FAILURE' }}" >> $GITHUB_STEP_SUMMARY

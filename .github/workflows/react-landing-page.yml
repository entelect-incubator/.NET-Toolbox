name: React Landing Page CI

on:
    push:
        branches: [main, develop]
        paths:
            - "LandingPage/**"
            - ".github/workflows/react-landing-page.yml"
    pull_request:
        branches: [main, develop]
        paths:
            - "LandingPage/**"
            - ".github/workflows/react-landing-page.yml"

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./LandingPage

        strategy:
            matrix:
                node-version: [18.x, 20.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: "./LandingPage/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Run Biome lint
              run: npm run lint

            - name: Run Biome format check
              run: npm run check

            - name: Build project
              run: npm run build

            - name: Build for development
              run: npm run build:dev

            - name: Upload build artifacts
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: landing-page-build-${{ matrix.node-version }}
                  path: LandingPage/dist
                  retention-days: 7

    security:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./LandingPage

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: "npm"
                  cache-dependency-path: "./LandingPage/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Run security audit
              run: npm audit --audit-level=moderate

            - name: Check for outdated packages
              run: npm outdated || true

    deploy-preview:
        runs-on: ubuntu-latest
        needs: [build-and-test]
        if: github.event_name == 'pull_request'

        defaults:
            run:
                working-directory: ./LandingPage

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: "npm"
                  cache-dependency-path: "./LandingPage/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Build for preview
              run: npm run build

            - name: Deploy preview (mock)
              run: echo "Would deploy preview with npm run deploy:preview"
              # Uncomment when Wrangler secrets are configured:
              # run: npm run deploy:preview

name: React Projects CI

on:
    push:
        branches: [main, develop]
        paths:
            - "React/**"
            - ".github/workflows/react-projects.yml"
    pull_request:
        branches: [main, develop]
        paths:
            - "React/**"
            - ".github/workflows/react-projects.yml"

jobs:
    detect-projects:
        runs-on: ubuntu-latest
        outputs:
            has-projects: ${{ steps.check.outputs.has-projects }}
            project-paths: ${{ steps.check.outputs.project-paths }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Check for React projects
              id: check
              run: |
                  cd React
                  PROJECT_PATHS=""
                  HAS_PROJECTS="false"

                  # Look for package.json files indicating React projects
                  if find . -name "package.json" -type f | head -1 | grep -q .; then
                    HAS_PROJECTS="true"
                    PROJECT_PATHS=$(find . -name "package.json" -type f -exec dirname {} \; | grep -v node_modules | tr '\n' ',' | sed 's/,$//')
                  fi

                  echo "has-projects=$HAS_PROJECTS" >> $GITHUB_OUTPUT
                  echo "project-paths=$PROJECT_PATHS" >> $GITHUB_OUTPUT
                  echo "Found React projects: $HAS_PROJECTS"
                  echo "Project paths: $PROJECT_PATHS"

    build-react-projects:
        runs-on: ubuntu-latest
        needs: detect-projects
        if: needs.detect-projects.outputs.has-projects == 'true'

        strategy:
            matrix:
                node-version: [18.x, 20.x]

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Build React projects
              run: |
                  cd React
                  PROJECT_PATHS="${{ needs.detect-projects.outputs.project-paths }}"
                  IFS=',' read -ra PATHS <<< "$PROJECT_PATHS"

                  for path in "${PATHS[@]}"; do
                    if [ -f "$path/package.json" ]; then
                      echo "Building React project in $path..."
                      cd "$path"
                      
                      # Install dependencies
                      if [ -f "package-lock.json" ]; then
                        npm ci
                      else
                        npm install
                      fi
                      
                      # Run available scripts
                      if npm run --silent 2>/dev/null | grep -q "lint"; then
                        echo "Running lint..."
                        npm run lint || echo "Lint completed with warnings"
                      fi
                      
                      if npm run --silent 2>/dev/null | grep -q "test"; then
                        echo "Running tests..."
                        npm run test -- --watchAll=false || echo "Tests completed with issues"
                      fi
                      
                      if npm run --silent 2>/dev/null | grep -q "build"; then
                        echo "Building project..."
                        npm run build
                      fi
                      
                      cd - > /dev/null
                    fi
                  done

    no-projects-found:
        runs-on: ubuntu-latest
        needs: detect-projects
        if: needs.detect-projects.outputs.has-projects == 'false'

        steps:
            - name: No React projects message
              run: |
                  echo "## React Projects CI" >> $GITHUB_STEP_SUMMARY
                  echo "No React projects with package.json found in the React directory." >> $GITHUB_STEP_SUMMARY
                  echo "This workflow will activate when React projects are added to the React folder." >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Expected structure:" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  echo "React/" >> $GITHUB_STEP_SUMMARY
                  echo "  project1/" >> $GITHUB_STEP_SUMMARY
                  echo "    package.json" >> $GITHUB_STEP_SUMMARY
                  echo "    src/" >> $GITHUB_STEP_SUMMARY
                  echo "  project2/" >> $GITHUB_STEP_SUMMARY
                  echo "    package.json" >> $GITHUB_STEP_SUMMARY
                  echo "    src/" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
